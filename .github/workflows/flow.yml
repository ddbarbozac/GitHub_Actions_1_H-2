name: Eventos
on: [push, pull_request]

jobs:
  detectar-evento:
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar el autor
        run: |
          echo "El autor es: ${{ github.actor }}"

      - name: Mostrar el tipo de evento
        run: |
          echo "El evento que me activó fue: ${{ github.event_name }}"        
